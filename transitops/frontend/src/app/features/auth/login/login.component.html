<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">T</div>
      <div>
        <h1>TransitOps</h1>
        <p>Smart Transport Operations</p>
      </div>
    </div>

    <h2>Sign in to your account</h2>
    <p class="login-sub">Enter your credentials to continue</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group mb-16">
        <label>Email address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@company.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group mb-16">
        <label>Password</label>
        <div class="password-field">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="eye-btn"
            (click)="togglePassword()"
            [title]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        style="width:100%; justify-content:center; padding:10px;"
        [disabled]="loading"
      >
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <hr class="divider" style="margin-top:24px;">
    <p class="text-muted text-sm" style="margin-bottom:10px;">Quick demo logins:</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
      <button class="btn btn-secondary btn-sm" (click)="fillDemo('fleet')">Fleet Manager</button>
      <button class="btn btn-secondary btn-sm" (click)="fillDemo('dispatch')">Dispatcher</button>
      <button class="btn btn-secondary btn-sm" (click)="fillDemo('safety')">Safety Officer</button>
      <button class="btn btn-secondary btn-sm" (click)="fillDemo('finance')">Financial Analyst</button>
    </div>

  </div>
</div>
